# Config para nginx del HOST (no el del contenedor).
# Va en /etc/nginx/sites-available/virtuousleadership.com.conf y se enlaza con
# `ln -s` en /etc/nginx/sites-enabled/.
#
# Después de copiarla, certbot añadirá automáticamente el bloque HTTPS.

server {
  listen 80;
  listen [::]:80;
  server_name virtuousleadership.com www.virtuousleadership.com;

  # Antes de tener cert, redirección desactivada — certbot la activa después.
  # Mientras tanto sirve el contenido por HTTP para validar.

  # /api/* → brevo-proxy en :3001 (sólo accesible desde localhost)
  location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # Todo lo demás → frontend (nginx del contenedor en :8081)
  location / {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Logs separados para este dominio
  access_log /var/log/nginx/virtuousleadership.access.log;
  error_log  /var/log/nginx/virtuousleadership.error.log;
}
