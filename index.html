<!doctype html>
<html lang="es">
  <head>
    <!-- Google tag (gtag.js) — tag estatico para que GA Verify lo detecte.
         send_page_view: false porque PageTracker (React Router) envia un
         page_view por cada cambio de ruta dentro de la SPA. Asi evitamos
         doble-conteo y al mismo tiempo Google encuentra el tag en el HTML. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HM6K1685L2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HM6K1685L2', { send_page_view: false });
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2A4A" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="canonical" href="https://virtuousleadership.com/es/" />

    <!-- Idiomas alternativos para Google (apuntan a la raiz de cada idioma) -->
    <link rel="alternate" hreflang="es" href="https://virtuousleadership.com/es/" />
    <link rel="alternate" hreflang="en" href="https://virtuousleadership.com/en/" />
    <link rel="alternate" hreflang="fr" href="https://virtuousleadership.com/fr/" />
    <link rel="alternate" hreflang="ru" href="https://virtuousleadership.com/ru/" />
    <link rel="alternate" hreflang="x-default" href="https://virtuousleadership.com/es/" />

    <!-- Title + descripción base (sobreescritos por react-helmet por ruta) -->
    <title>Virtuous Leadership Programs for Education Institutions</title>
    <meta name="description" content="Igniting hearts for greatness." />
    <meta name="author" content="Alexandre Havard" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://virtuousleadership.com/es/" />
    <meta property="og:site_name" content="Virtuous Leadership" />
    <meta property="og:title" content="Virtuous Leadership Programs for Education Institutions" />
    <meta property="og:description" content="Igniting hearts for greatness." />
    <meta property="og:image" content="https://virtuousleadership.com/logo.png" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="ru_RU" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Virtuous Leadership Programs for Education Institutions" />
    <meta name="twitter:description" content="Igniting hearts for greatness." />
    <meta name="twitter:image" content="https://virtuousleadership.com/logo.png" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Virtuous Leadership",
      "alternateName": ["Liderazgo Virtuoso", "Leadership Vertueux"],
      "url": "https://virtuousleadership.com",
      "logo": "https://virtuousleadership.com/logo.png",
      "description": "Igniting hearts for greatness.",
      "founder": {
        "@type": "Person",
        "name": "Alexandre Havard",
        "url": "https://alexhavard.com",
        "sameAs": ["https://alexhavard.com"]
      },
      "sameAs": ["https://alexhavard.com"],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "certification@virtuousleadership.com",
        "contactType": "customer support",
        "availableLanguage": ["Spanish", "English", "French", "Russian"]
      }
    }
    </script>

    <!-- Structured data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Virtuous Leadership Programs for Education Institutions",
      "url": "https://virtuousleadership.com",
      "inLanguage": ["es", "en", "fr", "ru"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
