server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 256;

  # Cache largo para assets con hash
  location ~* \.(?:js|css|png|jpe?g|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — toda ruta no encontrada cae en index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck para docker / Caddy
  location = /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
