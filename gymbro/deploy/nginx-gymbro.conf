# Bloque nginx para el host. Copiar a /etc/nginx/sites-available/gymbro
# (o /etc/nginx/conf.d/gymbro.conf según distro), simlinkear y recargar.
#
# Reemplaza GYMBRO_DOMAIN por el dominio real (ej. gymbro.example.com).
# Antes de arrancar HTTPS, ejecuta certbot para obtener el certificado:
#   sudo certbot certonly --nginx -d GYMBRO_DOMAIN
#
# Este bloque asume que docker-compose expone:
#   - web  en 127.0.0.1:8082
#   - api  en 127.0.0.1:3002
# El proxy_pass al api lo hace nginx interno del contenedor web (gymbro-web),
# así que aquí basta con apuntar todo al web.

server {
  listen 80;
  listen [::]:80;
  server_name GYMBRO_DOMAIN;

  # Para certbot http-01:
  location /.well-known/acme-challenge/ { root /var/www/certbot; }

  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name GYMBRO_DOMAIN;

  ssl_certificate     /etc/letsencrypt/live/GYMBRO_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/GYMBRO_DOMAIN/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Tamaños generosos por si se sube algún payload pesado del bot.
  client_max_body_size 10m;

  # Logs separados.
  access_log /var/log/nginx/gymbro.access.log;
  error_log  /var/log/nginx/gymbro.error.log;

  location / {
    proxy_pass http://127.0.0.1:8082;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
